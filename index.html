<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linkverzz Ultra Pro Max</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0d1117;
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-border: rgba(255, 255, 255, 0.2);
            --logo-g1: #00f2fe;
            --logo-g2: #4facfe;
            --accent: #4facfe;
            --glass: rgba(13, 17, 23, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-color); color: white; overflow-x: hidden; min-height: 100vh; display: flex; justify-content: center; }

        #galaxy-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        .main-wrapper { width: 100%; max-width: 450px; padding: 40px 20px; text-align: center; z-index: 10; transition: filter 0.3s; }
        .blur-effect { filter: blur(10px); }

        .site-logo {
            font-family: 'Orbitron', sans-serif; font-size: 42px; font-weight: 700; letter-spacing: 4px; margin-bottom: 30px;
            background: linear-gradient(90deg, var(--logo-g1), var(--logo-g2), var(--logo-g1));
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }

        .profile-box { position: relative; width: 160px; height: 160px; margin: 0 auto 20px; }
        .neon-ring {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, var(--logo-g1), var(--logo-g2), transparent);
            animation: rotateRing 3s linear infinite;
        }
        @keyframes rotateRing { 100% { transform: rotate(360deg); } }
        
        .profile-img {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 145px; height: 145px; border-radius: 50%; object-fit: cover;
            border: 4px solid #0d1117; z-index: 2;
        }

        .user-bio { font-size: 15px; color: #8b949e; line-height: 1.6; margin-bottom: 30px; }

        .tabs-container { display: flex; gap: 15px; margin-bottom: 25px; justify-content: center; }
        .tab-btn {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--btn-border);
            color: #8b949e; padding: 12px 24px; border-radius: 30px; cursor: pointer;
            font-weight: 600; font-family: 'Orbitron'; transition: 0.3s; flex: 1; outline: none;
        }
        .tab-btn.active {
            background: linear-gradient(90deg, var(--logo-g1), var(--logo-g2));
            color: black; border-color: transparent; box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }

        .links-list { display: none; flex-direction: column; gap: 18px; }
        .links-list.active { display: flex; }
        
        .social-btn {
            display: flex; align-items: center; justify-content: center; padding: 16px;
            background: var(--btn-bg); border: 1px solid var(--btn-border); border-radius: 50px;
            color: white; text-decoration: none; font-weight: 500; backdrop-filter: blur(10px); 
            transition: 0.3s; transform: translateY(0); opacity: 1;
        }
        .social-btn:hover { background: rgba(255, 255, 255, 0.15); transform: scale(1.03); box-shadow: 0 0 20px var(--btn-border); }

        .admin-trigger {
            position: fixed; top: 20px; right: 20px; background: white; color: black; border: none;
            padding: 10px 22px; border-radius: 30px; font-weight: bold; cursor: pointer; z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); font-family: 'Orbitron';
        }

        .modal-overlay {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            width: 90%; max-width: 400px; background: var(--glass); padding: 35px;
            border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1);
            display: none; z-index: 1000; opacity: 0; backdrop-filter: blur(20px);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-height: 85vh; overflow-y: auto;
        }
        .modal-overlay.active { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }

        .close-circle {
            position: absolute; top: -5px; right: -5px; background: #ff4d4d; color: white;
            border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 20px; z-index: 1001;
        }

        input, select { 
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid #30363d; padding: 15px; 
            border-radius: 12px; color: white; margin-bottom: 15px; outline: none;
        }
        select option { background: #0d1117; color: white; }

        .action-btn { 
            width: 100%; padding: 15px; border-radius: 12px; border: none; font-weight: bold; 
            cursor: pointer; margin-top: 10px; font-family: 'Orbitron'; transition: 0.3s;
        }
        .btn-blue { background: #3498db; color: white; }
        .btn-orange { background: #e67e22; color: white; }
        .btn-logout { background: #333; color: white; margin-top: 20px; }
    </style>
</head>
<body>
    <canvas id="galaxy-canvas"></canvas>
    
    <button class="admin-trigger" onclick="toggleModal('loginModal')">⚙️ Admin</button>

    <div class="modal-overlay" id="loginModal">
        <button class="close-circle" onclick="toggleModal('loginModal')">×</button>
        <h2 style="text-align:center; margin-bottom:25px; font-family:'Orbitron';">System Access</h2>
        <input type="email" id="email" placeholder="Admin Email">
        <input type="password" id="pass" placeholder="Secret Key">
        <button class="action-btn" style="background:white; color:black;" id="loginBtn">VERIFY IDENTITY</button>
    </div>

    <div class="modal-overlay" id="adminPanel">
        <button class="close-circle" onclick="toggleModal('adminPanel')">×</button>
        <h3 style="text-align:center; margin-bottom:20px; font-family:'Orbitron'; color:var(--logo-g1);">Control Panel</h3>
        
        <select id="newLinkType">
            <option value="social">📱 Social Media Link</option>
            <option value="website">🌐 Website Link</option>
        </select>
        
        <input type="text" id="newLinkName" placeholder="Enter Link Name">
        <input type="text" id="newLinkURL" placeholder="Enter Link URL">
        <button class="action-btn btn-orange" id="publishBtn">🔥 Publish New Link</button>
        
        <h5 style="margin-top:15px; text-align:left; font-family:'Orbitron'; color:var(--logo-g1); font-size:12px;">Social Links Dynamic List:</h5>
        <div id="adminSocialList" style="text-align:left; max-height:90px; overflow-y:auto; padding:5px; background:rgba(0,0,0,0.2); border-radius:10px; margin-bottom:10px;"></div>

        <h5 style="text-align:left; font-family:'Orbitron'; color:var(--logo-g2); font-size:12px;">Websites Links Dynamic List:</h5>
        <div id="adminWebsitesList" style="text-align:left; max-height:90px; overflow-y:auto; padding:5px; background:rgba(0,0,0,0.2); border-radius:10px;"></div>

        <hr style="margin: 20px 0; border: 0; border-top: 1px solid rgba(255,255,255,0.1);">
        <input type="text" id="newBio" placeholder="Update Bio Text">
        <input type="text" id="newImgURL" placeholder="New Profile Image URL">
        <button class="action-btn btn-orange" id="publishConfigBtn">🔥 Publish Bio/Image</button>
        <button class="action-btn btn-logout" onclick="location.reload()">Logout</button>
    </div>

    <div class="main-wrapper" id="content">
        <div class="site-logo">Linkverzz</div>
        <div class="profile-box">
            <div class="neon-ring"></div>
            <img src="https://i.ibb.co.com/vvBS30v9/1778097527400.png" class="profile-img" id="displayImg">
        </div>
        <p class="user-bio" id="displayBio">I am 14 years old. I am from Bangladesh. <br> Coding makes me happy :)</p>
        
        <div class="tabs-container">
            <button class="tab-btn active" id="tab-social" onclick="switchTab('social')">Social Media</button>
            <button class="tab-btn" id="tab-website" onclick="switchTab('website')">Websites</button>
        </div>

        <div class="links-list active" id="socialContainer">
            <a href="https://www.youtube.com/@Namelessx_001" target="_blank" class="social-btn">🎬 YouTube</a>
            <a href="https://tiktok.com/@nmaelssx_001" target="_blank" class="social-btn">🎵 TikTok</a>
            <a href="https://t.me/namelessx_001" target="_blank" class="social-btn">📢 Telegram Channel</a>
            <a href="https://t.me/namelessorxaity" target="_blank" class="social-btn">👥 Telegram Group</a>
            <a href="https://tiktok.com/@nexplay.lootdrop" target="_blank" class="social-btn">🛒 TikTok Shop</a>
            <a href="https://wa.me/8801886482400" target="_blank" class="social-btn">💬 WhatsApp</a>
            </div>

        <div class="links-list" id="websiteContainer">
            </div>
        
        <footer style="margin-top: 50px; font-size: 11px; color: #555; letter-spacing: 3px; font-family:'Orbitron';">© 2026 LINKVERZZ</footer>
    </div>

    <script>
        window.toggleModal = function(id) {
            const m = document.getElementById(id);
            const content = document.getElementById('content');
            if(!m) return;
            if(m.style.display === "block") {
                m.classList.remove('active');
                content.classList.remove('blur-effect');
                setTimeout(() => m.style.display = "none", 400);
            } else {
                m.style.display = "block";
                content.classList.add('blur-effect');
                setTimeout(() => m.classList.add('active'), 10);
            }
        };

        window.switchTab = function(type) {
            document.getElementById('tab-social').classList.toggle('active', type === 'social');
            document.getElementById('tab-website').classList.toggle('active', type === 'website');
            document.getElementById('socialContainer').classList.toggle('active', type === 'social');
            document.getElementById('websiteContainer').classList.toggle('active', type === 'website');
        };

        const canvas = document.getElementById('galaxy-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function initGalaxy() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<150; i++) {
                stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*1.5, speed: Math.random()*0.5 + 0.2 });
            }
        }
        function animateGalaxy() {
            ctx.clearRect(0,0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
                s.y += s.speed; if(s.y > canvas.height) s.y = 0;
            });
            requestAnimationFrame(animateGalaxy);
        }
        window.addEventListener('resize', initGalaxy); initGalaxy(); animateGalaxy();
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyDnundYKBAfZEplB26dV8SpjuhZTjWgfMA", 
            databaseURL: "https://linkverzz-default-rtdb.firebaseio.com/", 
            projectId: "linkverzz" 
        };
        const app = initializeApp(firebaseConfig); 
        const auth = getAuth(app); 
        const db = getDatabase(app);

        const socialContainer = document.getElementById('socialContainer');
        const websiteContainer = document.getElementById('websiteContainer');

        // Dynamic Database Listener
        onValue(ref(db), (snapshot) => {
            const data = snapshot.val() || {};
            
            // Clear previous dynamic links safely without losing base HTML static list
            const currentDynamics = document.querySelectorAll('.dynamic-link-item');
            currentDynamics.forEach(el => el.remove());
            
            const adminSocialList = document.getElementById('adminSocialList');
            const adminWebsitesList = document.getElementById('adminWebsitesList');
            
            if(adminSocialList) adminSocialList.innerHTML = ""; 
            if(adminWebsitesList) adminWebsitesList.innerHTML = ""; 

            // Render Realtime User Dynamic Social Links
            const uLinks = data.userLinks || {};
            if(typeof uLinks === 'object' && uLinks !== null) {
                Object.keys(uLinks).forEach((key) => {
                    const link = uLinks[key];
                    if(link && link.n && link.u) {
                        const a = document.createElement('a');
                        a.href = link.u; a.target = "_blank"; a.className = "social-btn dynamic-link-item";
                        a.innerText = link.n;
                        socialContainer.appendChild(a);

                        if(adminSocialList) {
                            adminSocialList.innerHTML += `<div class="dynamic-link-item" style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.05); padding:6px; margin-bottom:5px; border-radius:8px; border:1px solid rgba(255,255,255,0.1);">
                                             <span style="font-size:13px; color:#fff;">${link.n}</span> 
                                             <button class="del-btn" data-path="userLinks/${key}" style="background:#ff4d4d; color:white; border:none; padding:2px 8px; border-radius:5px; cursor:pointer; font-weight:bold;">X</button></div>`;
                        }
                    }
                });
            }

            // Render Realtime Dynamic Website Links
            const wLinks = data.websiteLinks || {};
            let hasWebsites = false;
            if(typeof wLinks === 'object' && wLinks !== null) {
                // Wipe placeholder text if any website exists
                websiteContainer.innerHTML = "";
                Object.keys(wLinks).forEach((key) => {
                    const link = wLinks[key];
                    if(link && link.n && link.u) {
                        hasWebsites = true;
                        const a = document.createElement('a');
                        a.href = link.u; a.target = "_blank"; a.className = "social-btn dynamic-link-item";
                        a.innerText = link.n;
                        websiteContainer.appendChild(a);

                        if(adminWebsitesList) {
                            adminWebsitesList.innerHTML += `<div class="dynamic-link-item" style="display:flex; justify-content:space-between; align-items:center; background:rgba(255,255,255,0.05); padding:6px; margin-bottom:5px; border-radius:8px; border:1px solid rgba(255,255,255,0.1);">
                                             <span style="font-size:13px; color:#fff;">${link.n}</span> 
                                             <button class="del-btn" data-path="websiteLinks/${key}" style="background:#ff4d4d; color:white; border:none; padding:2px 8px; border-radius:5px; cursor:pointer; font-weight:bold;">X</button></div>`;
                        }
                    }
                });
            }
            if(!hasWebsites) {
                websiteContainer.innerHTML = `<div style="color: #555; padding: 20px;" class="dynamic-link-item">No links added in Website tab yet!</div>`;
            }

            // Bind Event Listeners for Dynamic X (Delete) Buttons securely
            document.querySelectorAll('.del-btn').forEach(btn => {
                btn.onclick = () => {
                    const path = btn.getAttribute('data-path');
                    if(confirm("Are you sure you want to delete this link?")) {
                        remove(ref(db, path)).then(() => alert("রিমুভ করা হয়েছে! ✅"));
                    }
                };
            });

            if (data.siteConfigs) {
                if (data.siteConfigs.bio) document.getElementById('displayBio').innerHTML = data.siteConfigs.bio;
                if (data.siteConfigs.img) document.getElementById('displayImg').src = data.siteConfigs.img;
            }
        });

        // Trigger Login Functions
        document.getElementById('loginBtn').onclick = () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            signInWithEmailAndPassword(auth, email, pass)
                .then(() => { 
                    window.toggleModal('loginModal'); 
                    setTimeout(() => { window.toggleModal('adminPanel'); }, 400); 
                })
                .catch((err) => alert("Access Denied: " + err.message));
        };

        // Trigger Publish New Link
        document.getElementById('publishBtn').onclick = () => {
            const type = document.getElementById('newLinkType').value;
            const name = document.getElementById('newLinkName').value;
            const url = document.getElementById('newLinkURL').value;
            if (name && url) {
                const targetPath = type === 'social' ? 'userLinks/' : 'websiteLinks/';
                push(ref(db, targetPath), { n: name, u: url }).then(() => {
                    alert("লিংক সফলভাবে অ্যাড হয়েছে! 🔥");
                    document.getElementById('newLinkName').value = "";
                    document.getElementById('newLinkURL').value = "";
                });
            } else {
                alert("Please fill both fields!");
            }
        };

        // Trigger Quick Changes
        document.getElementById('publishConfigBtn').onclick = () => {
            const bioVal = document.getElementById('newBio').value || document.getElementById('displayBio').innerHTML;
            const imgVal = document.getElementById('newImgURL').value || document.getElementById('displayImg').src;
            set(ref(db, 'siteConfigs/'), { bio: bioVal, img: imgVal }).then(() => alert("Bio/Image Updated successfully!"));
        };
    </script>
</body>
</html>
