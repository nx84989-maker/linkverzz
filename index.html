<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Linkverzz Ultimate Hybrid Admin Core</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;600&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style id="dynamicAesthetics">
        :root {
            --bg-color: #0d1117;
            --btn-bg: rgba(255, 255, 255, 0.05);
            --btn-border: rgba(0, 242, 254, 0.2);
            --logo-g1: #00f2fe;
            --logo-g2: #4facfe;
            --glass: rgba(13, 17, 23, 0.98);
        }
    </style>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-color); color: white; overflow-x: hidden; min-height: 100vh; display: flex; justify-content: center; }
        #galaxy-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }

        .main-wrapper { width: 100%; max-width: 450px; padding: 40px 20px; text-align: center; z-index: 10; transition: filter 0.3s; }
        .blur-effect { filter: blur(10px); }

        .site-logo {
            font-family: 'Orbitron', sans-serif; font-size: 42px; font-weight: 700; letter-spacing: 4px; margin-bottom: 30px;
            background: linear-gradient(90deg, var(--logo-g1), var(--logo-g2), var(--logo-g1));
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shine 4s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }

        .profile-box { position: relative; width: 160px; height: 160px; margin: 0 auto 20px; }
        .neon-ring {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border-radius: 50%;
            background: conic-gradient(from 0deg, transparent, var(--logo-g1), var(--logo-g2), transparent);
            animation: rotateRing 3s linear infinite;
        }
        @keyframes rotateRing { 100% { transform: rotate(360deg); } }
        
        .profile-img {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 145px; height: 145px; border-radius: 50%; object-fit: cover;
            border: 4px solid #0d1117; z-index: 2;
        }

        .user-bio { font-size: 15px; color: #8b949e; line-height: 1.6; margin-bottom: 30px; white-space: pre-line; }
        .tabs-container { display: flex; gap: 15px; margin-bottom: 25px; justify-content: center; }
        .tab-btn {
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--btn-border);
            color: #8b949e; padding: 12px 24px; border-radius: 30px; cursor: pointer;
            font-weight: 600; font-family: 'Orbitron'; transition: 0.3s; flex: 1; outline: none;
        }
        .tab-btn.active {
            background: linear-gradient(90deg, var(--logo-g1), var(--logo-g2));
            color: black; border-color: transparent; box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }

        .links-list { display: none; flex-direction: column; gap: 18px; }
        .links-list.active { display: flex; }
        
        .social-btn {
            display: flex; align-items: center; justify-content: center; padding: 16px;
            background: var(--btn-bg); border: 1px solid var(--btn-border); border-radius: 50px;
            color: white; text-decoration: none; font-weight: 500; backdrop-filter: blur(10px); transition: 0.3s;
        }
        .social-btn:hover { background: rgba(255, 255, 255, 0.15); transform: scale(1.03); box-shadow: 0 0 20px var(--btn-border); }

        .admin-trigger {
            position: fixed; top: 20px; right: 20px; background: white; color: black; border: none;
            padding: 10px 22px; border-radius: 30px; font-weight: bold; cursor: pointer; z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); font-family: 'Orbitron';
        }

        .modal-overlay {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            width: 95%; max-width: 430px; background: var(--glass); padding: 25px;
            border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.1);
            display: none; z-index: 1000; opacity: 0; backdrop-filter: blur(25px);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            max-height: 90vh; overflow-y: auto;
        }
        .modal-overlay.active { display: block; opacity: 1; transform: translate(-50%, -50%) scale(1); }

        .close-circle {
            position: absolute; top: 10px; right: 10px; background: #ff4d4d; color: white;
            border: none; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-size: 18px; z-index: 1001;
        }

        input, select, textarea { 
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid #30363d; padding: 12px; 
            border-radius: 10px; color: white; margin-bottom: 12px; outline: none; font-size: 14px;
        }
        select option { background: #0d1117; color: white; }
        .section-title { font-family: 'Orbitron'; font-size: 13px; color: #00f2fe; margin-bottom: 8px; text-align: left; font-weight: bold; }

        .select-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .select-row select { margin-bottom: 0; }

        .action-btn { width: 100%; padding: 14px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 5px; font-family: 'Orbitron'; transition: 0.2s; }
        .orange-btn { background: #f3801e; color: white; }
        .orange-btn:hover { background: #ff8e31; }

        .engine-textarea {
            width: 100%; background: #05070a; border: 1px solid #00f2fe; color: #39ff14;
            font-family: 'Courier New', Courier, monospace; font-size: 12px; padding: 15px;
            border-radius: 12px; margin-bottom: 15px; line-height: 1.5; resize: vertical;
        }
    </style>
</head>
<body>
    <canvas id="galaxy-canvas"></canvas>
    <button class="admin-trigger" onclick="toggleModal('loginModal')">⚙️ Admin</button>

    <div class="modal-overlay" id="loginModal">
        <button class="close-circle" onclick="toggleModal('loginModal')">×</button>
        <h2 style="text-align:center; margin-bottom:20px; font-family:'Orbitron'; font-size: 18px;">System Login</h2>
        <input type="email" id="email" placeholder="Enter Admin Email">
        <input type="password" id="pass" placeholder="Enter Admin Password">
        <button class="action-btn" style="background:white; color:black;" id="loginBtn">LOG IN</button>
    </div>

    <div class="modal-overlay" id="adminPanel">
        <button class="close-circle" onclick="toggleModal('adminPanel')">×</button>
        <h3 style="text-align:center; font-family:'Orbitron'; color:var(--logo-g1); font-size: 16px; margin-bottom: 20px;">📱 Dynamic Social Links:</h3>
        
        <select id="linkTabType">
            <option value="social">Social Media Tab</option>
            <option value="website">Websites Tab</option>
        </select>
        <input type="text" id="linkTitle" placeholder="Link Title Name">
        <input type="text" id="linkUrl" placeholder="Paste Full URL Link">
        <button class="action-btn orange-btn" id="btnPublishLink">🔥 Publish New Link</button>
        
        <hr style="border: 0; border-top: 1px solid #30363d; margin: 20px 0;">

        <div class="section-title">🎨 Profile & Aesthetics Editor</div>
        <textarea id="inputBio" rows="3" placeholder="Update Bio Text..."></textarea>
        <input type="text" id="inputImg" placeholder="New Profile Image URL">
        
        <div class="select-row">
            <select id="inputTheme">
                <option value="cyan">💎 Cyan Neon</option>
                <option value="gold">👑 Gold Royal</option>
                <option value="ruby">🌹 Ruby Flame</option>
            </select>
            <select id="inputFont">
                <option value="Poppins">✨ Poppins</option>
                <option value="Orbitron">🛸 Orbitron</option>
                <option value="Roboto">📱 Roboto</option>
            </select>
        </div>
        <button class="action-btn orange-btn" id="btnSaveProfile">⚡ Save Layout Changes</button>

        <hr style="border: 0; border-top: 1px solid #30363d; margin: 20px 0;">

        <button class="action-btn" style="background: #00f2fe; color: black;" onclick="openAdvancedEngine()">💻 OPEN ADVANCED SOURCE ENGINE</button>
        <button class="action-btn" style="background:#222; color:#ff4d4d; margin-top:20px;" onclick="location.reload()">System Logout</button>
    </div>

    <div class="modal-overlay" id="codeEnginePanel" style="max-width: 500px;">
        <button class="close-circle" onclick="toggleModal('codeEnginePanel')">×</button>
        <h3 style="text-align:center; font-family:'Orbitron'; color:#39ff14; font-size: 15px; margin-bottom: 15px;">⚙️ FULL SOURCE ENGINE</h3>
        <textarea id="rawEngineCode" class="engine-textarea" rows="12"></textarea>
        <button class="action-btn" style="background:#39ff14; color:black;" id="btnCompileEngine">COMPILE CODE</button>
    </div>

    <div class="main-wrapper" id="content">
        <div class="site-logo">Linkverzz</div>
        <div class="profile-box">
            <div class="neon-ring"></div>
            <img src="https://i.ibb.co.com/vvBS30v9/1778097527400.png" class="profile-img" id="displayImg">
        </div>
        <p class="user-bio" id="displayBio">Coding makes me happy :)</p>
        
        <div class="tabs-container">
            <button class="tab-btn active" id="tab-social" onclick="switchTab('social')">Social Media</button>
            <button class="tab-btn" id="tab-website" onclick="switchTab('website')">Websites</button>
        </div>

        <div class="links-list active" id="socialContainer"></div>
        <div class="links-list" id="websiteContainer"></div>

        <footer style="margin-top: 50px; font-size: 11px; color: #555; letter-spacing: 3px; font-family:'Orbitron';">© 2026 LINKVERZZ</footer>
    </div>

    <script>
        window.toggleModal = function(id) {
            const m = document.getElementById(id);
            const content = document.getElementById('content');
            if(!m) return;
            if(m.style.display === "block") {
                m.classList.remove('active');
                content.classList.remove('blur-effect');
                setTimeout(() => m.style.display = "none", 400);
            } else {
                m.style.display = "block";
                content.classList.add('blur-effect');
                setTimeout(() => m.classList.add('active'), 10);
            }
        };

        window.switchTab = function(type) {
            document.getElementById('tab-social').classList.toggle('active', type === 'social');
            document.getElementById('tab-website').classList.toggle('active', type === 'website');
            document.getElementById('socialContainer').classList.toggle('active', type === 'social');
            document.getElementById('websiteContainer').classList.toggle('active', type === 'website');
        };

        window.applyLiveAesthetics = function(theme, font) {
            const styleTag = document.getElementById('dynamicAesthetics');
            document.body.style.fontFamily = `'${font}', sans-serif`;
            let colors = `--bg-color: #0d1117; --btn-bg: rgba(255, 255, 255, 0.05); --glass: rgba(13, 17, 23, 0.98);`;
            if(theme === 'gold') { colors += `--logo-g1: #ffe259; --logo-g2: #ffa751; --btn-border: rgba(255, 167, 81, 0.3);`; }
            else if(theme === 'ruby') { colors += `--logo-g1: #f857a6; --logo-g2: #ff5858; --btn-border: rgba(255, 88, 88, 0.3);`; }
            else { colors += `--logo-g1: #00f2fe; --logo-g2: #4facfe; --btn-border: rgba(0, 242, 254, 0.3);`; }
            styleTag.innerHTML = `:root { ${colors} }`;
        };

        window.openAdvancedEngine = function() {
            window.toggleModal('adminPanel');
            setTimeout(() => {
                document.getElementById('rawEngineCode').value = document.documentElement.outerHTML;
                window.toggleModal('codeEnginePanel');
            }, 400);
        };

        const canvas = document.getElementById('galaxy-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function initGalaxy() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<150; i++) { stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*1.5, speed: Math.random()*0.5 + 0.2 }); }
        }
        function animateGalaxy() {
            ctx.clearRect(0,0, canvas.width, canvas.height); ctx.fillStyle = "white";
            stars.forEach(s => { ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill(); s.y += s.speed; if(s.y > canvas.height) s.y = 0; });
            requestAnimationFrame(animateGalaxy);
        }
        window.addEventListener('resize', initGalaxy); initGalaxy(); animateGalaxy();
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, set, onValue, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = { databaseURL: "https://linkverzz-default-rtdb.firebaseio.com/", projectId: "linkverzz" };
        const app = initializeApp(firebaseConfig); const db = getDatabase(app);

        // Instantly maps local backup strings so interface never stays blank
        const defaults = [
            { type: 'social', title: '🎬 YouTube', url: 'https://www.youtube.com/@Namelessx_001' },
            { type: 'social', title: '🎵 TikTok', url: 'https://tiktok.com/@nmaelssx_001' },
            { type: 'social', title: '📢 Telegram Channel', url: 'https://t.me/namelessx_001' },
            { type: 'social', title: '👥 Telegram Group', url: 'https://t.me/namelessorxaity' },
            { type: 'social', title: '🛒 TikTok Shop', url: 'https://tiktok.com/@nexplay.lootdrop' },
            { type: 'social', title: '💬 WhatsApp', url: 'https://wa.me/8801886482400' }
        ];

        function renderLinks(linksArray) {
            const socialBox = document.getElementById('socialContainer');
            const websiteBox = document.getElementById('websiteContainer');
            socialBox.innerHTML = ""; websiteBox.innerHTML = "";
            linksArray.forEach(item => {
                const a = document.createElement('a'); a.href = item.url; a.target = "_blank"; a.className = "social-btn"; a.innerText = item.title;
                if (item.type === 'social') { socialBox.appendChild(a); } else { websiteBox.appendChild(a); }
            });
        }
        renderLinks(defaults); // Instant layout fallback mount

        onValue(ref(db, 'profileData'), (snapshot) => {
            const data = snapshot.val();
            if(data) {
                document.getElementById('displayBio').innerText = data.bio || "Coding makes me happy :)";
                if(data.img) document.getElementById('displayImg').src = data.img;
                window.applyLiveAesthetics(data.theme || 'cyan', data.font || 'Poppins');
            }
        });

        onValue(ref(db, 'links'), (snapshot) => {
            const rawData = snapshot.val();
            if (rawData) {
                const firebaseLinks = Object.keys(rawData).map(key => rawData[key]);
                renderLinks(firebaseLinks);
            }
        });

        document.getElementById('loginBtn').onclick = () => {
            const e = document.getElementById('email').value.trim(); const p = document.getElementById('pass').value.trim();
            if(e === "nx84989@gmail.com" && p === "Ehsan87201278") { window.toggleModal('loginModal'); setTimeout(() => { window.toggleModal('adminPanel'); }, 400); }
            else { alert("Wrong Access Pin! ❌"); }
        };

        document.getElementById('btnPublishLink').onclick = () => {
            const type = document.getElementById('linkTabType').value; const title = document.getElementById('linkTitle').value.trim(); const url = document.getElementById('linkUrl').value.trim();
            if(title && url) { push(ref(db, 'links'), { type, title, url }).then(() => { alert("🚀 Link Published!"); }); }
        };

        document.getElementById('btnSaveProfile').onclick = () => {
            const bio = document.getElementById('inputBio').value.trim(); const img = document.getElementById('inputImg').value.trim();
            const theme = document.getElementById('inputTheme').value; const font = document.getElementById('inputFont').value;
            set(ref(db, 'profileData'), { bio, img, theme, font }).then(() => alert("✨ System Saved!"));
        };

        document.getElementById('btnCompileEngine').onclick = () => {
            const editedRawSource = document.getElementById('rawEngineCode').value;
            if(editedRawSource.includes("<!DOCTYPE html>")) {
                set(ref(db, 'rawSourceEngineData'), { source: editedRawSource }).then(() => { alert("🚨 SOURCE COMPILED!"); document.open(); document.write(editedRawSource); document.close(); });
            }
        };
    </script>
</body>
</html>
