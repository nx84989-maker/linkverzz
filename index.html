<style>

:root{
--bg-color:#0d1117;
--btn-bg:rgba(255,255,255,0.05);
--btn-border:rgba(255,255,255,0.2);
--logo-g1:#00f2fe;

}

*{

padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:var(--bg-color);
color:white;
overflow-x:hidden;
min-height:100vh;

justify-content:center;
}

#galaxy-canvas{
position:fixed;

left:0;
width:100%;
height:100%;

}

.main-wrapper{

max-width:450px;
padding:40px 20px;
text-align:center;

.site-logo{

font-weight:700;

margin-bottom:30px;

var(--logo-g2),

);

-webkit-text-fill-color:transparent;
animation:shine 4s linear infinite;

@keyframes shine{

background-position:200% center;
}
}

height:160px;
margin:0 auto 20px;
}

.neon-ring{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border-radius:50%;

from 0deg,
transparent,
var(--logo-g1),
var(--logo-g2),
transparent
);

}

@keyframes rotateRing{
100%{
transform:rotate(360deg);
}
}

.profile-img{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:145px;
height:145px;
border-radius:50%;

border:4px solid #0d1117;

}

.social-btn{

padding:16px;
background:var(--btn-bg);
border:1px solid var(--btn-border);
border-radius:50px;

backdrop-filter:blur(10px);
transition:0.3s;
opacity:0;
transform:translateY(20px);

@keyframes fadeInUp{

}

.social-btn:hover{
background:rgba(255,255,255,0.15);
transform:scale(1.03);
box-shadow:0 0 20px var(--btn-border);
}

.admin-trigger{

top:20px;
right:20px;
background:white;
color:black;
border:none;

border-radius:30px;
font-weight:bold;

.modal-overlay.active{

.close-circle{
position:absolute;
top:-15px;
right:-15px;

color:white;
border:none;
width:40px;
height:40px;
border-radius:50%;
cursor:pointer;

input{
width:100%;

margin-bottom:15px;

.action-btn{
width:100%;

cursor:pointer;

font-family:'Orbitron';

.btn-blue{

<script>

// GALAXY

const canvas =
document.getElementById("galaxy-canvas");

const ctx =
canvas.getContext("2d");

let stars=[];

function initGalaxy(){

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

stars=[];

for(let i=0;i<150;i++){

stars.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height,

size:Math.random()*1.5,

speed:Math.random()*0.5+0.2

});

}

}

function animateGalaxy(){

ctx.clearRect(0,0,
canvas.width,
canvas.height);

ctx.fillStyle="white";

stars.forEach(s=>{

ctx.beginPath();

ctx.arc(
s.x,
s.y,
s.size,
0,
Math.PI*2
);

ctx.fill();

s.y+=s.speed;

if(s.y>canvas.height){

s.y=0;

}

});

requestAnimationFrame(
animateGalaxy
);

}

window.addEventListener(
"resize",
initGalaxy
);

initGalaxy();

animateGalaxy();

function toggleModal(id){

const m =
document.getElementById(id);

if(m.classList.contains("active")){

m.classList.remove("active");

setTimeout(()=>{

m.style.display="none";

},300);

}else{

m.style.display="block";

setTimeout(()=>{

m.classList.add("active");

},10);

}

}

</script>

},

},

{

const container =

email,
pass
)

.then(()=>{

if(name && url){

n:name,

u:url

})

.then(()=>{

});

}

};

window.publishQuickChanges=function(){

const bioVal=
document.getElementById("newBio").value
||
document.getElementById("displayBio").innerHTML;

const imgVal=
document.getElementById("newImgURL").value
||
document.getElementById("displayImg").src;

set(ref(db,"siteConfigs/"),{

bio:bioVal,

img:imgVal

})

.then(()=>{

alert("🔥 Published");

});

};

const codeArea=
document.getElementById("code-area");

const previewFrame=
document.getElementById("preview-iframe");

window.openAdvancedEditor=function(){

document.getElementById("editor-panel")
.style.display="flex";

codeArea.value=
document.documentElement.outerHTML;

updatePreview();

};

window.closeAdvancedEditor=function(){

document.getElementById("editor-panel")
.style.display="none";

};

codeArea.addEventListener(
"input",
updatePreview
);

function updatePreview(){

const previewDoc=
previewFrame.contentDocument
||
previewFrame.contentWindow.document;

previewDoc.open();

previewDoc.write(codeArea.value);

previewDoc.close();

}

window.saveLiveCode=function(){

set(ref(db,"advancedSource/"),{

html:codeArea.value

})

.then(()=>{

alert("🚀 Live Code Saved");

.catch(()=>{

};

window.logoutAdmin=function(){
